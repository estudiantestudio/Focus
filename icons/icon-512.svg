<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
>

  <defs>

    <linearGradient
      id="bg"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >

      <stop
        offset="0"
        stop-color="#051225"
      />

      <stop
        offset="1"
        stop-color="#02050d"
      />

    </linearGradient>

    <linearGradient
      id="ring"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >

      <stop
        offset="0"
        stop-color="#00d4ff"
      />

      <stop
        offset=".5"
        stop-color="#1677ff"
      />

      <stop
        offset="1"
        stop-color="#ff2b49"
      />

    </linearGradient>

  </defs>

  <rect
    width="512"
    height="512"
    rx="120"
    fill="url(#bg)"
  />

  <circle
    cx="256"
    cy="256"
    r="168"
    fill="none"
    stroke="url(#ring)"
    stroke-width="34"
  />

  <circle
    cx="256"
    cy="256"
    r="118"
    fill="#071326"
  />

  <text
    x="256"
    y="286"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="112"
    font-weight="800"
    fill="#ffffff"
  >
    C
  </text>

  <circle
    cx="395"
    cy="126"
    r="18"
    fill="#ff2b49"
  />

</svg>
